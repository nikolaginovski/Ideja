<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Производи за Дом - Идеја</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="category-page-body">
<header>
  <a class="logo-container" href="index.html">
    <img src="logo_transparent.png" alt="Ideja Logo">
    <h1>Идеја</h1>
  </a>
  <nav>
    <a class="nav-link" href="index.html">Дома</a>
    <a class="nav-link" href="category-home.html">Производи за Дом</a>
    <a class="nav-link" href="category-kids.html">Производи за Деца</a>
  </nav>
</header>

<main style="padding: 40px 6%;">
  <section class="section">
    <div class="section-header">
      <div>
        <h2>Производи за Дом</h2>
        <p class="section-subtitle">Откријте квалитетни украси, декорации и производи за ваша дневна, спална и соба.</p>
      </div>
    </div>
    <div class="categories-grid" id="subCategoriesGrid"></div>
  </section>
</main>

<footer id="footer">
  <div class="footer-logo">Идеја</div>
  <div class="footer-divider"></div>
  <p>© 2025 Идеја – Куманово</p>
  <div class="footer-contact" id="footerContact"></div>
  <div class="footer-decription" id="footerDescription"></div>
</footer>

<script src="script.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  renderCategoryHome();
  renderFooter();
});

function renderCategoryHome() {
  const container = document.getElementById("subCategoriesGrid");
  if (!container) return;
  
  container.innerHTML = "";
  const homeCats = mainCategories["home"] || [];
  
  homeCats.forEach(category => {
    const slug = categorySlug(category);
    const representative = products.find(p => p.category === category);
    const image = representative ? representative.img : "logo_transparent.png";
    const card = document.createElement("a");
    
    card.href = `index.html#${slug}`;
    card.className = "category-card";
    card.innerHTML = `
      <div class="category-card-image" style="background-image:url('${image}')"></div>
      <div class="category-card-title">${formatCategory(category)}</div>
    `;
    container.appendChild(card);
  });
}
</script>
</body>
</html>
