<!DOCTYPE html>
<html lang="mk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Идеја – Производ</title>
  <link rel="stylesheet" href="styles.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body class="product-page-body">

<!-- HEADER -->
<header>
  <a class="logo-container" href="index.html">
    <img src="logo.jpg" alt="Ideja Logo">
    <h1>Идеја</h1>
  </a>
  <nav>
    <a href="index.html">← Назад</a>
    <div id="authArea" style="display:contents;"></div>
    <a class="cart-nav-btn" onclick="openCart()" style="cursor:pointer;">
      🛒 Корпа <span class="cart-badge" id="cartBadge" style="display:none;">0</span>
    </a>
  </nav>
</header>

<!-- PRODUCT PAGE -->
<div class="product-page">
  <img id="prodImage" class="product-large" src="logo.jpg" alt="Производ">

  <div class="product-info">
    <div class="back-btn" onclick="window.location.href='index.html'">
      ← Назад кон продавница
    </div>
    <h2 id="prodTitle" style="font-family:'Playfair Display',serif;color:var(--burgundy);font-size:1.8rem;margin-bottom:8px;">
      Детален Приказ
    </h2>
    <div id="prodDesc"></div>
  </div>
</div>

<!-- CART SIDEBAR -->
<div class="cart-overlay" id="cartOverlay"></div>
<div class="cart-sidebar" id="cartSidebar">
  <div class="cart-header">
    <h3>🛒 Твојата Корпа</h3>
    <button class="cart-close" onclick="closeCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems">
    <div class="cart-empty">
      <div class="empty-icon">🛒</div>
      <p>Корпата е празна</p>
    </div>
  </div>
  <div class="cart-footer">
    <div class="discount-row">
      <span>Вкупно:</span>
      <span id="cartSubtotal">0 ден</span>
    </div>
    <div class="discount-row" style="display:none;">
      <span>Попуст -10%:</span>
      <span id="cartDiscount" style="color:#2ecc71;font-weight:700;"></span>
    </div>
    <div class="discount-row savings" style="display:none;">
      <span>🎉 Заштеда:</span>
      <span id="cartSavings"></span>
    </div>
    <div class="cart-total">
      <span>За Плаќање:</span>
      <span class="cart-total-price" id="cartTotal">0 ден</span>
    </div>
    <button class="checkout-btn" onclick="doCheckout()">Нарачај сега →</button>
  </div>
</div>

<!-- LOGIN MODAL -->
<div class="modal-overlay" id="loginModal">
  <div class="modal">
    <button class="modal-close" onclick="closeLoginModal()">✕</button>
    <div class="modal-logo"><img src="logo.jpg" alt="Ideja"></div>
    <h3>Добредојде</h3>
    <p class="modal-sub">Влези или регистрирај се</p>
    <div class="modal-tabs">
      <button class="modal-tab active" data-tab="login" onclick="switchTab('login')">Влези</button>
      <button class="modal-tab" data-tab="register" onclick="switchTab('register')">Регистрирај се</button>
    </div>
    <div class="modal-error" id="loginError"></div>
    <div id="loginForm">
      <div class="form-group">
        <label>Корисничко Ime</label>
        <input type="text" id="loginUsername" placeholder="твоекорисничкоime">
      </div>
      <div class="form-group">
        <label>Лозинка</label>
        <input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter') doLogin()">
      </div>
      <button class="btn-primary" onclick="doLogin()" style="width:100%;padding:13px;border-radius:12px;">Влези →</button>
    </div>
    <div id="registerForm" style="display:none;">
      <div class="form-group">
        <label>Ime и Презиме</label>
        <input type="text" id="regName" placeholder="Марко Марковски">
      </div>
      <div class="form-group">
        <label>Корисничко Ime</label>
        <input type="text" id="regUsername" placeholder="markomarkovski">
      </div>
      <div class="form-group">
        <label>Лозинка</label>
        <input type="password" id="regPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter') doRegister()">
      </div>
      <button class="btn-primary" onclick="doRegister()" style="width:100%;padding:13px;border-radius:12px;">Регистрирај се →</button>
    </div>
  </div>
</div>

<!-- CHECKOUT MODAL -->
<div class="modal-overlay checkout-modal" id="checkoutModal">
  <div class="modal">
    <button class="modal-close" onclick="document.getElementById('checkoutModal').classList.remove('open')">✕</button>
    <h3>🧾 Потврди Нарачка</h3>
    <p class="modal-sub">Прегледај ја твојата нарачка пред да ја поднесеш</p>
    <div id="checkoutLoginHint" style="display:none;"></div>
    <div id="checkoutItems" style="margin-bottom:12px;"></div>
    <div class="order-summary-total">
      <span>Вкупно:</span>
      <span id="checkoutTotal"></span>
    </div>
    <div style="margin-top:20px;display:flex;gap:12px;">
      <button class="btn-secondary" onclick="document.getElementById('checkoutModal').classList.remove('open');openCart();" style="flex:1;padding:12px;border-radius:12px;">← Назад</button>
      <button class="btn-primary" onclick="confirmCheckout()" style="flex:2;padding:12px;border-radius:12px;">✓ Потврди</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast-container" id="toastContainer"></div>

<script src="script.js"></script>
</body>
</html>
